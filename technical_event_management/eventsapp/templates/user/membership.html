{% extends 'base.html' %}

{% block content %}

<div class="card">
    <a href="javascript:history.back()" class="back-link">← Back</a>

    <h2>Your Membership</h2>

    <p><strong>Current Plan:</strong> {{ request.user.get_membership_display }}</p>
    <p><strong>Expiry Date:</strong> {{ request.user.membership_expiry }}</p>

    <hr>

    <form method="POST">
        {% csrf_token %}

        <label>Select Plan</label>
        <select name="membership">
            <option value="6m">6 Months</option>
            <option value="1y">1 Year</option>
            <option value="2y">2 Years</option>
        </select>

        <br><br>

        <button type="submit">Extend Membership</button>
        <button type="submit" name="cancel" value="1" style="background:red;">
            Cancel Membership
        </button>
    </form>

</div>

{% endblock %}
