{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Add New Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Product</button>
    </form>

    <hr>

    <a href="/vendor/items/view/">
        <button>View Products</button>
    </a>

    <a href="/vendor/items/status/">
        <button>Product Status</button>
    </a>

    <a href="/logout/">
        <button style="background:red;">Logout</button>
    </a>
</div>
{% endblock %}
