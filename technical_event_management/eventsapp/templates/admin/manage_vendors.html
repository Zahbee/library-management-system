{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Manage Vendors</h2>

    {% for vendor in vendors %}
        <div style="margin-bottom:20px;">
            <strong>{{ vendor.username }}</strong><br>
            Category: {{ vendor.vendor_category }}<br>
            Membership: {{ vendor.get_membership_display }}<br>
            Expiry: {{ vendor.membership_expiry }}

            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="vendor_id" value="{{ vendor.id }}">

                <button name="action" value="extend_6m">Extend 6 Months</button>
                <button name="action" value="extend_1y">Extend 1 Year</button>
                <button name="action" value="cancel" style="background:red;">Cancel</button>
            </form>
        </div>
        <hr>
    {% endfor %}
</div>
{% endblock %}
