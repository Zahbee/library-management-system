{% extends 'base.html' %}
{% block content %}

<h2>Admin Dashboard</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h5>Total Books</h5>
            <h3>{{ total_books }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h5>Total Users</h5>
            <h3>{{ total_users }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h5>Books Borrowed</h5>
            <h3>{{ total_borrowed }}</h3>
        </div>
    </div>
</div>

{% endblock %}
