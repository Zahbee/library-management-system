<!DOCTYPE html>
<html>
<head>
    <title>Library Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Library</a>
        <div>
            {% if user.is_authenticated %}
                <a href="/dashboard/" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="/books/" class="btn btn-outline-light btn-sm">Books</a>

                {% if not user.is_staff %}
                    <a href="/my-books/" class="btn btn-info btn-sm">My Books</a>
                {% endif %}

                {% if user.is_staff %}
                    <a href="/admin/" class="btn btn-warning btn-sm">Admin Panel</a>
                {% endif %}

                <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>

            {% else %}
                <a href="/login/" class="btn btn-outline-light btn-sm">Login</a>
                <a href="/register/" class="btn btn-success btn-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>


<div class="container mt-4">
    {% for message in messages %}
        <div class="alert alert-warning">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

</body>
</html>
